apiVersion: v1
kind: Secret
metadata:
  name: recruitment-secret
  namespace: nimesh-ns1
type: Opaque
data:
  username: cm9vdHVzZXIK
  password: cm9vdDEyMwo=
  url: bW9uZ29kYjovL3Jvb3R1c2VyOnJvb3QxMjNAbW9uZ29kYi1zZXJ2aWNlOjI3MDE3L2hyX3N5c3RlbT9hdXRoU291cmNlPWFkbWluCg==

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: nimesh-ns1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo
        ports:
        - containerPort: 27017
        env:
          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: recruitment-secret
                key: username
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: recruitment-secret
                key: password

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: nimesh-ns1
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-app
  namespace: nimesh-ns1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recruitment-app
  template:
    metadata:
      labels:
        app: recruitment-app
    spec:
      containers:
      - name: recruitment-app
        image: nimeshsv814/recruitment-app:v1.1.1
        ports:
        - containerPort: 3000
        env:
          - name: MONGO_URI
            valueFrom:
              secretKeyRef:
                name: recruitment-secret
                key: url

---
apiVersion: v1
kind: Service
metadata:
  name: recruitment-service
  namespace: nimesh-ns1
spec:
  selector:
    app: recruitment-app
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30087
  type: NodePort