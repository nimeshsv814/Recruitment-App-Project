apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recruitment-backend
  template:
    metadata:
      labels:
        app: recruitment-backend
    spec:
      containers:
      - name: recruitment-backend
        image: nimeshsv/recruitment-app:v1.1.1
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: recruitment-service
spec:
  selector:
    app: recruitment-backend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30007
  type: NodePort